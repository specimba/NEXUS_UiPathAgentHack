name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Contract tests
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q nexus_uipath_bridge
